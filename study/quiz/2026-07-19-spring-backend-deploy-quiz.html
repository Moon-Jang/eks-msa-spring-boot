<style>
  :root {

  .pill {

    background: var(--card);

    padding: 22px 22px 18px;
    margin-bottom: 16px;

  .q .num { flex: 0 0 auto; font-weight: 700; color: var(--accent); font-size: 14px; }
  .q .qtext { font-size: 16px; font-weight: 600; }
  .q .topic { font-size: 11px; color: var(--muted); font-weight: 600; text-transform: uppercase; letter-spacing: .5px; }

    display: flex; gap: 11px; align-items: flex-start;

    transition: border-color .15s, background .15s;

  label.opt input { margin-top: 3px; accent-color: var(--accent); flex: 0 0 auto; }
  label.opt .otext { font-size: 14.5px; }
  label.opt.correct { border-color: var(--ok); background: var(--ok-soft); }
  label.opt.wrong { border-color: var(--bad); background: var(--bad-soft); }
  .explain {
    margin-top: 12px; font-size: 13.5px; color: var(--muted);

    background: #121a29; border-radius: 0 8px 8px 0; display: none;

  .explain.show { display: block; }
  .explain b { color: var(--text); }
  .actionbar {
    position: fixed; bottom: 0; left: 0; right: 0;
    background: rgba(15,20,32,.92); backdrop-filter: blur(8px);
    border-top: 1px solid var(--border); padding: 14px 16px;
    display: flex; justify-content: center; gap: 12px; align-items: center; z-index: 20;

  .btn {

    background: var(--card); border: 1px solid var(--border); border-radius: 18px;

  .score-ring { font-size: 52px; font-weight: 800; letter-spacing: -1px; margin: 6px 0; }
  .score-sub { color: var(--muted); font-size: 15px; margin-bottom: 18px; }
  .grade { font-size: 20px; font-weight: 700; margin-bottom: 10px; }
  .modal .btn { width: 100%; margin-top: 8px; }
  .breakdown { text-align: left; margin: 18px 0; font-size: 13.5px; color: var(--muted); max-height: 180px; overflow-y: auto; }

  .breakdown .b-ok { color: var(--ok); }
  .breakdown .b-bad { color: var(--bad); }
</style>
</head>

const quizEl = document.getElementById('quiz');
const answers = new Array(QUESTIONS.length).fill(null);

QUESTIONS.forEach((item, qi) => {
  const card = document.createElement('div');
  card.className = 'q';
  card.id = 'q' + qi;
  const optsHtml = item.opts.map((o, oi) => `
    <label class="opt" data-q="${qi}" data-o="${oi}">
      <input type="radio" name="q${qi}" value="${oi}">
      <span class="otext">${o}</span>
    </label>`).join('');
  card.innerHTML = `
    <div class="qhead">
      <span class="num">Q${qi + 1}</span>
      <div>
        <div class="topic">${item.topic}</div>
        <div class="qtext">${item.q}</div>
      </div>
    </div>
    <div class="opts">${optsHtml}</div>
    <div class="explain" id="ex${qi}"></div>`;
  quizEl.appendChild(card);
});

function updateCounter() {
  const done = answers.filter(a => a !== null).length;
  document.getElementById('counter').textContent = `${done} / ${QUESTIONS.length} 선택됨`;
  document.getElementById('progress').style.width = (done / QUESTIONS.length * 100) + '%';
}

quizEl.addEventListener('change', (e) => {
  if (e.target.matches('input[type=radio]')) {
    const qi = +e.target.closest('.opt').dataset.q;
    answers[qi] = +e.target.value;
    updateCounter();
  }
});

document.getElementById('resetBtn').addEventListener('click', resetAll);
function resetAll() {
  answers.fill(null);
  document.querySelectorAll('input[type=radio]').forEach(r => r.checked = false);
  document.querySelectorAll('.opt').forEach(o => o.classList.remove('correct', 'wrong'));
  document.querySelectorAll('.explain').forEach(e => e.classList.remove('show'));
  updateCounter();
  window.scrollTo({ top: 0, behavior: 'smooth' });
}

document.getElementById('submitBtn').addEventListener('click', () => {
  const unanswered = answers.filter(a => a === null).length;
  if (unanswered > 0 && !confirm(`아직 ${unanswered}문항을 안 풀었습니다. 그래도 채점할까요?`)) return;

  let score = 0;
  let breakdown = '';
  QUESTIONS.forEach((item, qi) => {
    const chosen = answers[qi];
    const correct = item.answer;
    const labels = document.querySelectorAll(`#q${qi} .opt`);
    labels.forEach((lab, oi) => {
      lab.classList.remove('correct', 'wrong');
      if (oi === correct) lab.classList.add('correct');
      if (oi === chosen && chosen !== correct) lab.classList.add('wrong');
    });
    const ex = document.getElementById('ex' + qi);
    ex.innerHTML = `<b>정답: ${correct + 1}번.</b> ${item.explain}`;
    ex.classList.add('show');
    const ok = chosen === correct;
    if (ok) score++;
    breakdown += `<div class="${ok ? 'b-ok' : 'b-bad'}">${ok ? '✔' : '✗'} Q${qi + 1} (${item.topic})${chosen === null ? ' · 미응답' : ''}</div>`;
  });

  const pct = Math.round(score / QUESTIONS.length * 100);
  let grade, emoji;
  if (pct >= 90) { grade = '완벽에 가깝습니다'; emoji = '🏆'; }
  else if (pct >= 75) { grade = '실무 감각 양호'; emoji = '💪'; }
  else if (pct >= 60) { grade = '핵심은 잡았습니다'; emoji = '📚'; }
  else { grade = '복습이 필요합니다'; emoji = '🔧'; }

  document.getElementById('grade').textContent = emoji + ' ' + grade;
  document.getElementById('scoreRing').textContent = score + ' / ' + QUESTIONS.length;
  document.getElementById('scoreSub').textContent = `정답률 ${pct}%`;
  document.getElementById('breakdown').innerHTML = breakdown;
  document.getElementById('overlay').classList.add('show');
});

document.getElementById('reviewBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
});
document.getElementById('retryBtn').addEventListener('click', () => {
  document.getElementById('overlay').classList.remove('show');
  resetAll();
});
document.getElementById('overlay').addEventListener('click', (e) => {
  if (e.target.id === 'overlay') document.getElementById('overlay').classList.remove('show');
});

updateCounter();
</script>
</body>
